            transition: 0.3s ease;

            color: #3a2e1f;

        /* Glowing Aura */
        .zodiac-wrapper {
            position: relative;
            width: 350px;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .zodiac-wrapper::before {
            content: "";
            position: absolute;
            width: 380px;
            height: 380px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.3) 0%, transparent 70%);
            animation: pulseGlow 3s ease-in-out infinite;
        }

        .zodiac-wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            animation: rotateWheel 25s linear infinite;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
        }


        /* Rotation Animation */
        @keyframes rotateWheel {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Glow Pulse Animation */
        @keyframes pulseGlow {
            0% {
                transform: scale(1);
                opacity: 0.7;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0.7;
            }
        }

        /* Responsive */
        @media(max-width: 992px) {
            .zodiac-wrapper {
                width: 260px;
                height: 260px;
                margin-top: 40px;
            }

            .zodiac-wrapper::before {
